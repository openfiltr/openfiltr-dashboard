name: Bug Report
description: Report a bug in OpenFiltr Dashboard
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behaviour.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
  - type: input
    id: version
    attributes:
      label: OpenFiltr Dashboard Version
      placeholder: "e.g. v1.0.0"
  - type: dropdown
    id: install
    attributes:
      label: Installation Method
      options: [Docker, curl installer, Manual binary, Built from source]
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Logs, screenshots, or other relevant information.
